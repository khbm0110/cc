version: "3.8"

services:
  postgres:
    image: postgres:14-alpine
    container_name: copy-trading-postgres
    environment:
      POSTGRES_USER: copytrading
      POSTGRES_PASSWORD: copytrading
      POSTGRES_DB: copytrading
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U copytrading"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: copy-trading-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
